<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Finished Pizza</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-image: url(background.jpg);
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column; /* stack h1 on top of image */
      align-items: center;    /* center horizontally */
    }

    h1 {
      margin: 20px 0 0 0;   /* space from top */
      font-size: 70px;
      text-align: center;
      color: rgb(11, 11, 11);         /* optional for better visibility */
      text-shadow: 2px 2px 4px rgb(226, 165, 165); /* optional for contrast */
    }

   #resultImage {
  max-width: 75vw;                  /* almost full width */
  max-height: 77vh;                 /* almost full height */
  object-fit: contain;
}
 button {
      padding: 8px 16px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background-color: coral;
      color: rgb(0, 0, 0);
      
    }
    button:hover{
       background: #06d6a0;
    }
  </style>
</head>
<body>

  <h1>🍕My Pizza</h1>
  <img id="resultImage" />
  <button onclick="goToParfait()">🍨MAKE A PARFAIT</button>

  <script>
   const img = document.getElementById("resultImage");
img.src = sessionStorage.getItem("parfaitImage");

  </script>
   <script>
function goToParfait() {
  window.location.href = "/food-maker/parfait-maker/index.html";
}
</script>
</body>
</html>
